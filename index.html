<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Player UI</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="player">

  <img src="https://picsum.photos/300" class="cover">

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
